name: Validate tap migrations

on:
  pull_request:
    paths: ["tap_migrations.json"]
  push:
    branches: [main]
    paths: ["tap_migrations.json"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tap_migrations.json
        run: bin/validate-tap-migrations
